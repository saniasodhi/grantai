openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GrantAI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: grants
    description: Grant operations
  - name: matches
    description: Grant matching operations
  - name: applications
    description: Grant application operations
  - name: ai
    description: AI-powered operations
  - name: anthropic
    description: Anthropic AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create or update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /grants:
    get:
      operationId: listGrants
      tags: [grants]
      summary: List all grants
      parameters:
        - name: focusArea
          in: query
          required: false
          schema:
            type: string
        - name: location
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of grants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grant"

  /grants/{id}:
    get:
      operationId: getGrant
      tags: [grants]
      summary: Get grant details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Grant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /grants/stats/summary:
    get:
      operationId: getGrantStats
      tags: [grants]
      summary: Get grant stats summary
      responses:
        "200":
          description: Grant statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantStats"

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: Get matched grants for a user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of matches with grants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchWithGrant"

  /matches/generate:
    post:
      operationId: generateMatches
      tags: [matches]
      summary: Generate AI-powered grant matches for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateMatchesBody"
      responses:
        "200":
          description: Generated matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchWithGrant"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications for a user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithGrant"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Create a new application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationBody"
      responses:
        "201":
          description: Created application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get application details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationWithGrant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Update application draft text or status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationBody"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteApplication
      tags: [applications]
      summary: Delete application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/{id}/generate:
    post:
      operationId: generateApplicationDraft
      tags: [ai]
      summary: Generate an AI draft for a grant application (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of generated draft text
          content:
            text/event-stream: {}
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/{id}/rewrite:
    post:
      operationId: rewriteApplicationText
      tags: [ai]
      summary: Rewrite a selected passage of application text (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RewriteTextBody"
      responses:
        "200":
          description: SSE stream of rewritten text
          content:
            text/event-stream: {}
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /magic:
    post:
      operationId: runMagicMode
      tags: [ai]
      summary: Magic Mode — analyze org description, match grants, draft application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicModeBody"
      responses:
        "200":
          description: Top matches and pre-written application draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MagicModeResult"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    User:
      type: object
      properties:
        id:
          type: integer
        orgName:
          type: string
        orgType:
          type: string
        mission:
          type: string
        location:
          type: string
        focusAreas:
          type: string
        fundingNeed:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orgName
        - orgType
        - mission
        - location
        - focusAreas
        - createdAt

    CreateUserBody:
      type: object
      properties:
        orgName:
          type: string
        orgType:
          type: string
        mission:
          type: string
        location:
          type: string
        focusAreas:
          type: string
        fundingNeed:
          type: ["integer", "null"]
      required:
        - orgName
        - orgType
        - mission
        - location
        - focusAreas

    UpdateUserBody:
      type: object
      properties:
        orgName:
          type: string
        orgType:
          type: string
        mission:
          type: string
        location:
          type: string
        focusAreas:
          type: string
        fundingNeed:
          type: ["integer", "null"]

    Grant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        funder:
          type: string
        amount:
          type: ["integer", "null"]
        deadline:
          type: ["string", "null"]
        eligibility:
          type: string
        focusArea:
          type: string
        location:
          type: string
        description:
          type: string
        website:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - funder
        - eligibility
        - focusArea
        - location
        - description
        - createdAt

    GrantStats:
      type: object
      properties:
        totalGrants:
          type: integer
        totalFunding:
          type: integer
        byFocusArea:
          type: array
          items:
            $ref: "#/components/schemas/FocusAreaCount"
        upcomingDeadlines:
          type: integer
      required:
        - totalGrants
        - totalFunding
        - byFocusArea
        - upcomingDeadlines

    FocusAreaCount:
      type: object
      properties:
        focusArea:
          type: string
        count:
          type: integer
      required:
        - focusArea
        - count

    Match:
      type: object
      properties:
        userId:
          type: integer
        grantId:
          type: integer
        fitScore:
          type: integer
        winProbability:
          type: ["integer", "null"]
        reasoning:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - userId
        - grantId
        - fitScore
        - reasoning
        - createdAt

    MatchWithGrant:
      type: object
      properties:
        userId:
          type: integer
        grantId:
          type: integer
        fitScore:
          type: integer
        winProbability:
          type: ["integer", "null"]
        reasoning:
          type: string
        createdAt:
          type: string
          format: date-time
        grant:
          $ref: "#/components/schemas/Grant"
      required:
        - userId
        - grantId
        - fitScore
        - reasoning
        - createdAt
        - grant

    GenerateMatchesBody:
      type: object
      properties:
        userId:
          type: integer
      required:
        - userId

    Application:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        grantId:
          type: integer
        draftText:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - grantId
        - status
        - createdAt
        - updatedAt

    ApplicationWithGrant:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        grantId:
          type: integer
        draftText:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        grant:
          $ref: "#/components/schemas/Grant"
      required:
        - id
        - userId
        - grantId
        - status
        - createdAt
        - updatedAt
        - grant

    CreateApplicationBody:
      type: object
      properties:
        userId:
          type: integer
        grantId:
          type: integer
        draftText:
          type: ["string", "null"]
        status:
          type: string
      required:
        - userId
        - grantId

    UpdateApplicationBody:
      type: object
      properties:
        draftText:
          type: ["string", "null"]
        status:
          type: string

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    MagicModeBody:
      type: object
      properties:
        description:
          type: string
      required:
        - description

    MagicModeMatchItem:
      type: object
      properties:
        grantId:
          type: integer
        fitScore:
          type: integer
        winProbability:
          type: integer
        reasoning:
          type: string
        grant:
          $ref: "#/components/schemas/Grant"
      required:
        - grantId
        - fitScore
        - winProbability
        - reasoning
        - grant

    MagicModeInferredProfile:
      type: object
      properties:
        orgName:
          type: string
        mission:
          type: string
        focusArea:
          type: string
      required:
        - orgName
        - mission
        - focusArea

    MagicModeResult:
      type: object
      properties:
        inferredProfile:
          $ref: "#/components/schemas/MagicModeInferredProfile"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/MagicModeMatchItem"
        draft:
          type: string
        topGrantName:
          type: string
        topGrantFunder:
          type: string
      required:
        - inferredProfile
        - matches
        - draft
        - topGrantName
        - topGrantFunder

    RewriteTextBody:
      type: object
      properties:
        selectedText:
          type: string
        instruction:
          type: string
      required:
        - selectedText
        - instruction

    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
